name: Build and Deploy P2 Repository

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Install D toolchain (provides DUB for integration tests)
        uses: dlang-community/setup-dlang@v1
        with:
          compiler: dmd-latest

      - name: Build and test
        run: xvfb-run mvn clean verify --no-transfer-progress

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload P2 repository
        uses: actions/upload-pages-artifact@v3
        with:
          path: bin-maven/features.repository/repository

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
